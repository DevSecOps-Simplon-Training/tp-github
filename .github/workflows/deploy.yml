name: Deploy

on:
  workflow_dispatch:
    inputs:
      mon_input:
        description: "Choix de l'environnement de déploiement"
        required: true
        default: "deploy-staging"
        type: choice
        options:
          - staging
          - production

jobs:
  deploy-staging:
    runs-on: ubuntu-latest
    environment: staging          # utilise l'environnement staging

    steps:
      - name: Déployer en staging
        run: echo "Déploiement en staging..."

  deploy-production:
    runs-on: ubuntu-latest
    environment: production
    needs: deploy-staging

    steps:
      - name: Déployer en production
        run: echo "Déploiement en production !"