name: Deploy

on:
  workflow_dispatch:
    inputs:
      mon_input:
        description: "Choix de l'environnement de déploiement"
        required: true
        default: "deploy-staging"
        type: choice
        options:
          - staging
          - production

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    steps:
      - name: Déployer en ${{ inputs.environment }}
        run: echo "Déploiement en ${{ inputs.environment }}"
